<div class="app">
  <header class="header">
    <h1>Three.js 3D Test</h1>
  </header>
  <main class="main">
    <div class="scene-container" #sceneContainer>
    </div>
    <aside class="sidebar">
      <h2>Menu</h2>
      <div>
        <button class="btn btn-primary" (click)="fileInput.click()">Wczytaj model</button>
        <input
          #fileInput
          type="file"
          (change)="onFileSelected($event)"
          accept=".glb,.gltf"
          hidden
        />
      </div>
    </aside>
  </main>
  <footer class="footer">
    <p>Footer</p>
  </footer>
</div>
